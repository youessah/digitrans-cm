# ============================================================
# DIGITRANS-CM — Horizontal Pod Autoscaler
# Augmente automatiquement les copies selon la charge
# ============================================================
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: digitrans-api-hpa
  namespace: production
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: digitrans-api
  minReplicas: 2    # Minimum 2 copies (haute dispo)
  maxReplicas: 10   # Maximum 10 copies (pic de charge)
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70  # Scale si CPU > 70%
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80  # Scale si RAM > 80%
